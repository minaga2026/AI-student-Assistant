<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L AI Study Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient-1: #e0e7ff; 
            --bg-gradient-2: #ede9fe;
            --chat-bg: rgba(255, 255, 255, 0.75);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #8b5cf6;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --message-bot-bg: #f8fafc;
            --message-user-bg: var(--primary-color);
            --border-color: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), #f3e8ff);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            height: 95vh;
            max-height: 900px;
            background: var(--chat-bg);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }
        .header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-info { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }
        .title h1 { font-size: 1.2rem; font-weight: 700; color: #0f172a; }
        .title p { font-size: 0.8rem; color: var(--secondary-color); font-weight: 500; }
        .quick-actions {
            padding: 12px 20px; display: flex; gap: 10px; overflow-x: auto;
            background: rgba(255, 255, 255, 0.4); border-bottom: 1px solid var(--border-color);
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        .action-btn {
            white-space: nowrap; padding: 8px 16px; background: white;
            border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 20px;
            font-size: 0.85rem; font-weight: 500; color: var(--primary-color);
            cursor: pointer; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
        }
        .action-btn:hover { background: var(--primary-color); color: white; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2); }
        .chat-area {
            flex: 1; padding: 24px 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
        .message {
            max-width: 85%; display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-content {
            padding: 14px 18px; border-radius: 20px;
            font-size: 0.95rem; line-height: 1.5;
            word-wrap: break-word; box-shadow: var(--shadow-sm);
        }
        .bot-message { align-self: flex-start; }
        .bot-message .message-content {
            background-color: var(--message-bot-bg); color: var(--text-main);
            border-bottom-left-radius: 4px; border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .user-message { align-self: flex-end; }
        .user-message .message-content {
            background-color: var(--message-user-bg); color: white;
            border-bottom-right-radius: 4px;
        }
        /* Study plan bubble */
        .bot-message.html-message { max-width: 100%; }
        .bot-message.html-message .message-content { padding: 18px 20px; overflow-x: auto; }
        .bot-message.html-message .message-content table {
            width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 0.88rem;
        }
        .bot-message.html-message .message-content th {
            background: var(--primary-color); color: white; padding: 9px 12px; text-align: left;
        }
        .bot-message.html-message .message-content td { padding: 8px 12px; border: 1px solid #e2e8f0; }
        .bot-message.html-message .message-content tr:nth-child(even) td { background: #f8faff; }
        .bot-message.html-message .message-content h2 { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 6px; }
        .bot-message.html-message .message-content h3 { font-size: 0.98rem; color: var(--primary-hover); margin: 14px 0 6px; }
        .bot-message.html-message .message-content ul { background: #f9f9ff; padding: 14px 14px 14px 28px; border-radius: 8px; list-style: none; }
        .bot-message.html-message .message-content ul li { margin: 5px 0; font-size: 0.9rem; }

        .error-message {
            align-self: center; max-width: 90%;
            background-color: #fee2e2; color: #ef4444;
            padding: 10px 16px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; border: 1px solid #fecaca;
        }
        .thinking {
            display: none; align-self: flex-start;
            background-color: var(--message-bot-bg);
            padding: 14px 18px; border-radius: 20px; border-bottom-left-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: var(--shadow-sm);
        }
        .thinking.active { display: flex; align-items: center; gap: 6px; }
        .thinking .dot {
            width: 8px; height: 8px; background-color: var(--primary-color);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        .thinking .dot:nth-child(1) { animation-delay: -0.32s; }
        .thinking .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .input-area {
            padding: 16px 20px; background: rgba(255, 255, 255, 0.8);
            border-top: 1px solid var(--border-color);
            display: flex; gap: 12px; align-items: center;
        }
        .input-wrapper {
            flex: 1; position: relative; display: flex; align-items: center;
            background: white; border-radius: 24px; padding: 4px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.05); transition: all 0.3s ease;
        }
        .input-wrapper:focus-within { box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); border-color: var(--primary-color); }
        #user-input {
            flex: 1; border: none; background: transparent;
            padding: 12px 16px; font-size: 1rem; color: var(--text-main); outline: none;
        }
        #user-input::placeholder { color: #94a3b8; }
        #send-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; margin-right: 4px;
        }
        #send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        @media (max-width: 600px) { .app-container { height: 100vh; max-height: none; border-radius: 0; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-info">
                <div class="avatar"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="title">
                    <h1>A/L Study Assistant</h1>
                    <p>Biology • Chemistry • Agriculture</p>
                </div>
            </div>
        </header>
        <nav class="quick-actions" aria-label="Quick Actions">
            <button class="action-btn" onclick="fillInput('Generate Quiz')">
                <i class="fa-solid fa-clipboard-question"></i> Generate Quiz
            </button>
            <button class="action-btn" onclick="fillInput('Make Study Plan')">
                <i class="fa-solid fa-calendar-check"></i> Make Study Plan
            </button>
            <button class="action-btn" onclick="fillInput('Summarize Notes')">
                <i class="fa-solid fa-book-open"></i> Summarize Notes
            </button>
        </nav>
        <main class="chat-area" id="chat-area">
            <div class="message bot-message">
                <div class="message-content">
                    <p>Ayubowan! 👋 I'm your A/L Study Assistant. Whether you need help with a complex Biology process, an organic Chemistry reaction, or Agriculture principles, I'm here for you.</p>
                </div>
            </div>
            <div class="thinking" id="thinking-indicator">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </main>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask a study question..." autocomplete="off">
                <button id="send-btn" onclick="sendMessage()" aria-label="Send Message">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinkingIndicator = document.getElementById('thinking-indicator');

        userInput.addEventListener('input', function() { sendBtn.disabled = !this.value.trim(); });
        userInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });

        function fillInput(text) { userInput.value = text; userInput.focus(); sendBtn.disabled = false; }

        function createMessage(content, isUser = false, isHtml = false) {
            const messageDiv = document.createElement('div');
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isUser) {
                messageDiv.className = 'message user-message';
                contentDiv.textContent = content;
            } else if (isHtml) {
                messageDiv.className = 'message bot-message html-message';
                contentDiv.innerHTML = content;
            } else {
                messageDiv.className = 'message bot-message';
                contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            }

            messageDiv.appendChild(contentDiv);
            chatArea.insertBefore(messageDiv, thinkingIndicator);
            scrollToBottom();
        }

        function showError(text) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message error-message';
            errorDiv.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${text}`;
            chatArea.insertBefore(errorDiv, thinkingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

        // n8n එකෙන් එන ඕනෑම format එකක් handle කරන function
        function extractReply(data) {
            // Case 1: { reply: "...", isHtml: true/false }
            if (data && data.reply !== undefined) {
                return { reply: String(data.reply), isHtml: data.isHtml === true };
            }
            // Case 2: Array — [{ reply: "...", isHtml: ... }]
            if (Array.isArray(data) && data[0] && data[0].reply !== undefined) {
                return { reply: String(data[0].reply), isHtml: data[0].isHtml === true };
            }
            // Case 3: { output: "..." } — AI Agent direct
            if (data && data.output !== undefined) {
                return { reply: String(data.output), isHtml: false };
            }
            // Case 4: plain string
            if (typeof data === 'string') {
                return { reply: data, isHtml: false };
            }
            return null;
        }

        async function sendMessage() {
            const messageText = userInput.value.trim();
            if (!messageText) return;

            createMessage(messageText, true);
            userInput.value = '';
            sendBtn.disabled = true;
            thinkingIndicator.classList.add('active');
            scrollToBottom();

            try {
                const response = await fetch("http://localhost:5678/webhook/study-bot", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: messageText })
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const data = await response.json();
                console.log("n8n Response:", JSON.stringify(data)); // Debug

                thinkingIndicator.classList.remove('active');

                const extracted = extractReply(data);

                if (extracted && extracted.reply) {
                    createMessage(extracted.reply, false, extracted.isHtml);
                } else {
                    showError("Received an empty response from the AI.");
                }

            } catch (error) {
                console.error("Webhook Error:", error);
                thinkingIndicator.classList.remove('active');
                showError("Could not connect to the study bot API! Please ensure the n8n test webhook is running at <code>http://localhost:5678/webhook-test/study-bot</code> exactly.");
            } finally {
                if (userInput.value.trim()) sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
